<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APEX Agent Hub — Internal</title>
<meta name="description" content="APEX Financial Empire — internal agent hub. Recordings, scripts, trainings, and tools for licensed APEX agents." />
<link rel="icon" type="image/png" href="assets/apex-logo.png" />
<meta property="og:type" content="website" />
<meta property="og:title" content="APEX Agent Hub" />
<meta property="og:description" content="Recordings, scripts, trainings, and tools — internal resource hub for licensed APEX agents." />
<meta property="og:image" content="assets/apex-logo-trans.png" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="APEX Agent Hub" />
<meta name="twitter:description" content="Recordings, scripts, trainings, and tools — internal resource hub for licensed APEX agents." />
<meta name="twitter:image" content="assets/apex-logo-trans.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #C9A84C;
    --bg: #0A0A0A;
    --surface: #131313;
    --surface-2: #1A1A1A;
    --line: rgba(255,255,255,0.09);
    --line-2: rgba(255,255,255,0.06);
    --text: #F4F2ED;
    --muted: #8C8A84;
    --muted-2: #6A6862;
    --head: 'Bebas Neue', 'DM Sans', sans-serif;
    --body: 'DM Sans', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--gold); color: #0A0A0A; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }

  /* ---------- GATE ---------- */
  .gate {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: radial-gradient(circle at 50% 30%, #141414 0%, var(--bg) 62%);
  }
  .gate-card {
    width: min(420px, 100%); text-align: center;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 18px; padding: 44px 40px 34px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .gate-logo { height: 52px; width: auto; margin: 0 auto 26px; display: block; }
  .gate-kicker {
    margin: 0 0 18px; display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold);
  }
  .gate-kicker .lock { font-size: 7px; }
  .gate-title { margin: 0 0 8px; font-family: var(--head); font-weight: 400; font-size: 34px; line-height: 1.04; letter-spacing: 0.02em; }
  .gate-sub { margin: 0 0 26px; font-size: 14px; color: var(--muted); }
  .gate-field {
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 0 14px; height: 48px; display: flex; align-items: center; transition: border-color .16s, box-shadow .16s;
  }
  .gate-field:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.13); }
  .gate-field-err { border-color: #E5484D; }
  .gate-field input {
    flex: 1; background: transparent; border: 0; outline: 0; color: var(--text);
    font-size: 15px; font-family: var(--body); letter-spacing: 0.05em;
  }
  .gate-field input::placeholder { color: var(--muted-2); letter-spacing: normal; }
  .gate-err { margin: 12px 0 0; font-size: 13px; color: #E5484D; }
  .gate-btn {
    margin-top: 20px; width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--gold); color: #0A0A0A; border: 0; border-radius: 10px;
    font-size: 15px; font-weight: 700; padding: 14px; transition: .16s;
  }
  .gate-btn:hover { filter: brightness(1.08); }
  .gate-btn .cta-arrow { transition: transform .18s; }
  .gate-btn:hover .cta-arrow { transform: translateX(3px); }
  .gate-foot { margin: 24px 0 0; font-size: 12px; color: var(--muted-2); }

  /* ---------- NAV ---------- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    max-width: 1240px; margin: 0 auto;
    padding: 0 32px; height: 76px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .brand { display: flex; align-items: center; }
  .logo { height: 38px; width: auto; display: block; }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .search {
    display: flex; align-items: center; gap: 9px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 9px; padding: 0 12px; height: 40px; width: 300px;
    transition: border-color .18s, box-shadow .18s;
  }
  .search:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.13); }
  .search-icon { color: var(--muted); font-size: 17px; line-height: 1; }
  .search input {
    flex: 1; min-width: 0; background: transparent; border: 0; outline: 0;
    color: var(--text); font-size: 14px; font-family: var(--body);
  }
  .search input::placeholder { color: var(--muted-2); }
  .search-clear { background: none; border: 0; color: var(--muted); font-size: 12px; padding: 2px; }
  .search-clear:hover { color: var(--text); }
  .internal-label {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gold); white-space: nowrap;
    border: 1px solid rgba(201,168,76,0.3); border-radius: 999px; padding: 6px 12px;
  }
  .internal-label .lock { font-size: 7px; }

  /* ---------- LAYOUT ---------- */
  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px 80px; }

  .nav-home {
    font-size: 13px; font-weight: 600; color: var(--muted);
    padding: 7px 13px; border-radius: 8px; border: 1px solid var(--line);
    transition: .16s; white-space: nowrap;
  }
  .nav-home:hover { color: var(--gold); border-color: var(--gold); }

  /* ---------- HUB (home) ---------- */
  .hub { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
  .hub-card {
    position: relative; display: flex; flex-direction: column; gap: 18px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    padding: 30px 30px 26px; min-height: 230px;
    transition: transform .18s, border-color .18s, background .18s;
    overflow: hidden;
  }
  .hub-card:hover { transform: translateY(-4px); border-color: var(--gold); }
  .hub-num {
    font-family: var(--head); font-size: 44px; line-height: 1; color: transparent;
    -webkit-text-stroke: 1.5px color-mix(in srgb, var(--gold) 55%, transparent);
    letter-spacing: 0.04em;
  }
  .hub-body { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .hub-label { font-family: var(--head); font-size: 34px; line-height: 1.0; letter-spacing: 0.012em; }
  .hub-desc { font-size: 15px; line-height: 1.55; color: var(--muted); max-width: 42ch; text-wrap: pretty; }
  .hub-foot {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding-top: 18px; border-top: 1px solid var(--line-2);
  }
  .hub-meta { font-size: 13px; color: var(--muted-2); }
  .hub-go { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 600; color: var(--gold); }
  .hub-card:hover .cta-arrow { transform: translateX(3px); }

  /* ---------- PAGE HEAD (library) ---------- */
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
    flex-wrap: wrap; padding: 56px 0 32px;
  }
  .page-head .search { width: 320px; }
  .page-head-text .sec-title { margin: 12px 0 0; }

  /* ---------- HERO ---------- */
  .hero { padding: 64px 0 40px; max-width: 760px; }
  .hero-kicker {
    margin: 0 0 16px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);
  }
  .hero-title {
    margin: 0; font-family: var(--head); font-weight: 400;
    font-size: clamp(44px, 6vw, 78px); line-height: 0.96; letter-spacing: 0.01em;
    text-wrap: balance;
  }
  .hero-sub {
    margin: 22px 0 0; font-size: 17px; line-height: 1.55; color: var(--muted);
    max-width: 560px; text-wrap: pretty;
  }

  /* ---------- TABS ---------- */
  .tabs {
    display: flex; flex-wrap: wrap; gap: 4px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 0; margin-bottom: 36px;
  }
  .tab {
    position: relative; background: none; border: 0;
    color: var(--muted); font-size: 14px; font-weight: 600;
    padding: 12px 16px 16px; display: inline-flex; align-items: center; gap: 8px;
    transition: color .16s;
  }
  .tab:hover { color: var(--text); }
  .tab-on { color: var(--text); }
  .tab-on::after {
    content: ""; position: absolute; left: 16px; right: 16px; bottom: -1px;
    height: 2px; background: var(--gold);
  }
  .tab-count {
    font-size: 11px; font-weight: 600; color: var(--muted-2);
    background: var(--surface-2); border-radius: 999px; padding: 2px 8px; min-width: 22px; text-align: center;
  }
  .tab-on .tab-count { color: var(--gold); background: rgba(201,168,76,0.12); }

  /* ---------- GRID ---------- */
  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(312px, 1fr));
  }
  [data-density="compact"] .grid { grid-template-columns: repeat(auto-fill, minmax(264px, 1fr)); gap: 14px; }
  [data-density="comfy"] .grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }

  /* ---------- CARD ---------- */
  .card {
    position: relative; text-align: left;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 22px;
    display: flex; flex-direction: column; gap: 12px;
    color: var(--text); transition: transform .18s ease, border-color .18s, background .18s;
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--bc); opacity: 0; transition: opacity .18s;
  }
  .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.18); }
  .card:hover::before { opacity: 1; }
  [data-density="compact"] .card { padding: 18px; border-radius: 12px; }
  [data-density="comfy"] .card { padding: 28px; }

  [data-cardstyle="filled"] .card { background: var(--surface-2); border-color: transparent; }
  [data-cardstyle="filled"] .card:hover { background: #202020; }
  [data-cardstyle="minimal"] .card { background: transparent; border-color: var(--line-2); }
  [data-cardstyle="minimal"] .card:hover { background: var(--surface); }

  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .card-date { font-size: 12px; color: var(--muted-2); white-space: nowrap; }
  .card-title {
    margin: 0; font-family: var(--head); font-weight: 400;
    font-size: 25px; line-height: 1.02; letter-spacing: 0.012em;
  }
  [data-density="compact"] .card-title { font-size: 22px; }
  .card-desc { margin: 0; font-size: 14px; line-height: 1.5; color: var(--muted); flex: 1; text-wrap: pretty; }
  .card-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 4px; padding-top: 14px; border-top: 1px solid var(--line-2);
  }
  .card-meta { font-size: 12px; color: var(--muted-2); font-variant-numeric: tabular-nums; }
  .card-cta {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--gold);
  }
  .cta-arrow { transition: transform .18s; display: inline-block; }
  .card:hover .cta-arrow { transform: translateX(3px); }

  /* ---------- BADGE ---------- */
  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--bc); background: color-mix(in srgb, var(--bc) 13%, transparent);
    border: 1px solid color-mix(in srgb, var(--bc) 28%, transparent);
    border-radius: 999px;
  }
  .badge-sm { font-size: 10.5px; padding: 4px 10px; }
  .badge-md { font-size: 12px; padding: 6px 13px; }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--bc); }

  /* ---------- MODAL ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(5,5,5,0.74); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; padding: 24px;
    animation: fade .2s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    position: relative; width: min(560px, 100%);
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 18px; padding: 34px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: pop .22s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop { from { opacity: 0; transform: translateY(14px) scale(.98); } to { opacity: 1; transform: none; } }
  .modal-close {
    position: absolute; top: 18px; right: 18px;
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--muted); font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center; transition: .16s;
  }
  .modal-close:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .modal-top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .modal-title {
    margin: 0 0 16px; font-family: var(--head); font-weight: 400;
    font-size: 38px; line-height: 1.0; letter-spacing: 0.012em; padding-right: 30px;
  }
  .modal-long { margin: 0; font-size: 15px; line-height: 1.65; color: var(--muted); text-wrap: pretty; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 22px 0 0; }
  .tag { font-size: 12px; color: var(--muted-2); background: var(--surface-2); border-radius: 6px; padding: 4px 9px; }
  .modal-foot {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--line);
  }
  .action-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--gold); color: #0A0A0A;
    font-size: 14px; font-weight: 700; letter-spacing: 0.01em;
    padding: 12px 22px; border-radius: 9px; transition: .16s;
  }
  .action-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .action-btn .cta-arrow { transition: transform .18s; }
  .action-btn:hover .cta-arrow { transform: translateX(3px); }

  /* ---------- EMPTY ---------- */
  .empty { text-align: center; padding: 80px 20px; }
  .empty-big { font-family: var(--head); font-size: 34px; margin: 0 0 8px; color: var(--text); }
  .empty-sub { font-size: 15px; color: var(--muted); margin: 0; }

  /* ---------- RECORDED PRESENTATIONS ---------- */
  .rec-section { padding: 8px 0 16px; }
  .sec-head { max-width: 680px; margin-bottom: 30px; }
  .sec-title {
    margin: 14px 0 0; font-family: var(--head); font-weight: 400;
    font-size: clamp(30px, 4vw, 46px); line-height: 1.0; letter-spacing: 0.012em; text-wrap: balance;
  }
  .sec-sub { margin: 14px 0 0; font-size: 16px; color: var(--muted); }

  .presenters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 34px; }
  .presenter {
    flex: 1 1 0; min-width: 130px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 22px 16px 18px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text); transition: transform .18s, border-color .18s, background .18s;
  }
  .presenter:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.18); }
  .presenter-on { border-color: var(--gold); background: color-mix(in srgb, var(--gold) 7%, var(--surface)); }
  .avatar {
    width: 54px; height: 54px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--head); font-size: 24px; letter-spacing: 0.04em;
    color: var(--gold); background: var(--surface-2);
    border: 1.5px solid color-mix(in srgb, var(--gold) 45%, transparent);
    margin-bottom: 8px; transition: .18s;
  }
  .presenter-on .avatar { background: var(--gold); color: #0A0A0A; border-color: var(--gold); }
  .avatar-sm { width: 42px; height: 42px; font-size: 18px; margin-bottom: 0; }
  .presenter-name { font-size: 15px; font-weight: 600; }
  .presenter-role { font-size: 12px; color: var(--muted-2); }
  .presenter-on .presenter-role { color: var(--gold); }

  .rec-listhead {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px;
  }
  .rec-listhead-name { font-family: var(--head); font-size: 22px; letter-spacing: 0.03em; }
  .rec-listhead-count { font-size: 13px; color: var(--muted-2); }
  .rec-grid { display: grid; gap: 10px; }
  .rec-empty {
    border: 1px dashed var(--line); border-radius: 14px; padding: 48px 24px; text-align: center;
  }
  .rec-empty-big { font-family: var(--head); font-size: 26px; margin: 0 0 6px; color: var(--text); letter-spacing: 0.02em; }
  .rec-empty-sub { font-size: 14px; color: var(--muted); margin: 0; }
  .rec-card {
    display: flex; align-items: center; gap: 16px; text-align: left;
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 18px; color: var(--text); transition: transform .16s, border-color .16s, background .16s;
  }
  .rec-card:hover { border-color: var(--gold); background: var(--surface-2); transform: translateX(2px); }
  .rec-play {
    flex: none; width: 42px; height: 42px; border-radius: 50%;
    background: color-mix(in srgb, var(--gold) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--gold) 34%, transparent);
    display: flex; align-items: center; justify-content: center; transition: .16s;
  }
  .rec-card:hover .rec-play { background: var(--gold); border-color: var(--gold); }
  .rec-play-tri { color: var(--gold); font-size: 13px; margin-left: 2px; transition: color .16s; }
  .rec-card:hover .rec-play-tri { color: #0A0A0A; }
  .rec-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .rec-title { font-size: 16px; font-weight: 600; line-height: 1.25; }
  .rec-meta { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted-2); }
  .rec-topic {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--gold); background: color-mix(in srgb, var(--gold) 12%, transparent);
    border-radius: 5px; padding: 2px 8px;
  }
  .rec-dot { color: var(--line); }
  .rec-video-tag { font-size: 12px; color: var(--gold); font-weight: 600; }
  .rec-dur { flex: none; font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* divider before resource library */
  .lib-head { display: flex; align-items: center; gap: 18px; margin: 64px 0 30px; }

  /* ---------- PLAYER MODAL ---------- */
  .modal-player { width: min(620px, 100%); max-height: 90vh; display: flex; flex-direction: column; overflow-y: auto; }
  .pm-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .pm-by { display: flex; flex-direction: column; gap: 2px; margin-right: auto; }
  .pm-presenter { font-size: 15px; font-weight: 600; }
  .pm-role { font-size: 12px; color: var(--muted-2); }
  .pm-topic { align-self: center; }
  .modal-player .modal-title { margin-bottom: 18px; }

  .mp { display: flex; flex-direction: column; min-height: 0; }

  /* media surface placeholder */
  .media-stage {
    position: relative; aspect-ratio: 16 / 9; width: 100%; max-height: 300px; flex-shrink: 0;
    border-radius: 12px; overflow: hidden; cursor: pointer;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.022) 0 12px, transparent 12px 24px),
      radial-gradient(circle at 50% 42%, #1c1c1c 0%, #101010 70%);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
  }
  .media-tag {
    position: absolute; left: 14px; bottom: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; letter-spacing: 0.04em; color: var(--muted-2);
    text-transform: uppercase;
  }
  .media-play {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--gold); color: #0A0A0A; border: 0; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4); transition: transform .16s, filter .16s; padding-left: 3px;
  }
  .media-stage:hover .media-play { transform: scale(1.06); filter: brightness(1.05); }
  .media-stage-video { cursor: default; padding: 0; background: #000; }
  .media-stage-audio { cursor: default; padding: 0; background: #000; aspect-ratio: auto; height: 172px; max-height: none; }
  .media-frame { width: 100%; height: 100%; border: 0; display: block; }
  .media-live {
    position: absolute; right: 12px; top: 12px; display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold);
    background: rgba(10,10,10,0.6); border-radius: 999px; padding: 5px 10px; backdrop-filter: blur(4px);
  }
  .media-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .player {
    display: flex; align-items: center; gap: 16px; margin-top: 14px; flex-shrink: 0;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px;
  }
  .player-btn {
    flex: none; width: 44px; height: 44px; border-radius: 50%;
    background: var(--gold); color: #0A0A0A; border: 0; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: .16s; padding-left: 2px;
  }
  .player-btn:hover { filter: brightness(1.08); }
  .player-main { flex: 1; min-width: 0; }
  .player-track { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.1); cursor: pointer; position: relative; }
  .player-fill { height: 100%; border-radius: 999px; background: var(--gold); position: relative; }
  .player-knob {
    position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.22);
  }
  .player-times {
    display: flex; justify-content: space-between; margin-top: 9px;
    font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums;
  }

  /* transcript */
  .ts { margin-top: 18px; display: flex; flex-direction: column; min-height: 0; flex: 1 1 auto; }
  .ts-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 10px; flex-shrink: 0; }
  .ts-title {
    font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text);
  }
  .ts-auto { font-size: 11px; color: var(--muted-2); }
  .ts-body {
    position: relative; overflow-y: auto; max-height: 230px; min-height: 0;
    border: 1px solid var(--line); border-radius: 12px; padding: 6px;
    display: flex; flex-direction: column; gap: 2px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) transparent;
  }
  .ts-body::-webkit-scrollbar { width: 8px; }
  .ts-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 8px; }
  .ts-line {
    display: flex; gap: 12px; text-align: left; width: 100%;
    background: none; border: 0; border-radius: 8px; padding: 9px 11px;
    color: var(--muted); transition: background .14s, color .14s;
  }
  .ts-line:hover { background: var(--surface-2); color: var(--text); }
  .ts-time {
    flex: none; font-size: 12px; font-variant-numeric: tabular-nums;
    color: var(--muted-2); padding-top: 1px; min-width: 38px;
  }
  .ts-text { font-size: 14px; line-height: 1.5; }
  .ts-line-on { background: color-mix(in srgb, var(--gold) 12%, transparent); color: var(--text); }
  .ts-line-on .ts-time { color: var(--gold); font-weight: 600; }
  .ts-pending { align-items: center; justify-content: center; padding: 22px 18px; text-align: center; }
  .ts-pending-text { margin: 0; font-size: 13.5px; line-height: 1.6; color: var(--muted); max-width: 46ch; }

  /* ---------- QUICK LINKS ---------- */
  .quicklinks { margin-top: 72px; }
  .ql-head { display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }
  .ql-rule { flex: 1; height: 1px; background: var(--line); }
  .ql-label {
    font-family: var(--head); font-size: 22px; letter-spacing: 0.06em;
    color: var(--muted); text-transform: uppercase;
  }
  .ql-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .ql-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 20px 22px; display: flex; flex-direction: column; gap: 5px; transition: .18s;
  }
  .ql-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .ql-name {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 16px; font-weight: 600; color: var(--text);
  }
  .ql-ext { color: var(--gold); font-size: 14px; }
  .ql-sub { font-size: 13px; color: var(--muted-2); }

  /* ---------- FOOTER ---------- */
  .foot {
    margin-top: 64px; padding-top: 26px; border-top: 1px solid var(--line);
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    font-size: 13px; color: var(--muted-2);
  }
  .foot-dot { color: var(--line); }

  /* ---------- TRANSCRIBER ---------- */
  .tr-input-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 18px; padding: 32px; margin-bottom: 24px; max-width: 800px;
  }
  .tr-type-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tr-type-tab {
    background: none; border: 1px solid var(--line); border-radius: 8px;
    color: var(--muted); font-size: 14px; font-weight: 600;
    padding: 8px 18px; transition: .16s;
  }
  .tr-type-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .tr-type-tab-on { color: var(--text); border-color: var(--gold); background: color-mix(in srgb, var(--gold) 8%, transparent); }

  .tr-url-field {
    width: 100%; background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 10px; padding: 13px 16px; color: var(--text);
    font-size: 15px; font-family: var(--body); outline: none; transition: .16s;
  }
  .tr-url-field:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.13); }
  .tr-url-field::placeholder { color: var(--muted-2); }
  .tr-url-hint { font-size: 13px; color: var(--muted-2); margin: 10px 0 0; }

  .tr-dropzone {
    border: 2px dashed var(--line); border-radius: 12px;
    padding: 48px 24px; text-align: center;
    transition: border-color .16s, background .16s; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .tr-dropzone:hover, .tr-dropzone-over { border-color: var(--gold); background: color-mix(in srgb, var(--gold) 5%, transparent); }
  .tr-drop-icon { font-size: 28px; }
  .tr-drop-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .tr-drop-sub { font-size: 13px; color: var(--muted-2); }
  .tr-drop-file { font-size: 14px; font-weight: 600; color: var(--gold); background: color-mix(in srgb, var(--gold) 12%, transparent); border-radius: 6px; padding: 4px 12px; }

  .tr-submit {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--gold); color: #0A0A0A;
    font-size: 15px; font-weight: 700;
    padding: 13px 28px; border: 0; border-radius: 10px;
    transition: .16s; margin-top: 20px;
  }
  .tr-submit:hover { filter: brightness(1.08); }
  .tr-submit:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

  .tr-processing {
    text-align: center; padding: 72px 24px; max-width: 800px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .tr-spinner {
    width: 48px; height: 48px; border-radius: 50%;
    border: 3px solid rgba(201,168,76,0.2); border-top-color: var(--gold);
    animation: tr-spin 0.9s linear infinite;
  }
  @keyframes tr-spin { to { transform: rotate(360deg); } }
  .tr-proc-label { font-family: var(--head); font-size: 26px; margin: 0; }
  .tr-proc-sub { font-size: 14px; color: var(--muted); margin: 0; }

  .tr-result { max-width: 800px; }
  .tr-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .tr-action-btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 13px; font-weight: 600; padding: 9px 16px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--surface); color: var(--text); transition: .16s;
  }
  .tr-action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .tr-action-new { background: var(--surface-2); }

  .tr-summary {
    background: color-mix(in srgb, var(--gold) 8%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--gold) 28%, transparent);
    border-radius: 14px; padding: 22px 24px; margin-bottom: 18px;
  }
  .tr-summary-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold); margin: 0 0 10px; display: block;
  }
  .tr-summary-text { font-size: 15px; line-height: 1.65; color: var(--text); margin: 0; }

  .tr-keywords { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
  .tr-kw {
    font-size: 12px; font-weight: 600; color: var(--text);
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 12px;
  }
  .tr-kw-count { color: var(--muted-2); font-weight: 400; margin-left: 4px; }

  .tr-transcript-box {
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
  }
  .tr-transcript-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--line);
  }
  .tr-transcript-label { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
  .tr-transcript-count { font-size: 12px; color: var(--muted-2); }
  .tr-transcript-body {
    padding: 8px; max-height: 560px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) transparent;
  }
  .tr-transcript-body::-webkit-scrollbar { width: 8px; }
  .tr-transcript-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 8px; }

  .tr-utterance {
    display: flex; gap: 14px; padding: 11px 14px; border-radius: 10px;
    transition: background .12s; align-items: flex-start;
  }
  .tr-utterance:hover { background: var(--surface-2); }
  .tr-utt-left { display: flex; flex-direction: column; gap: 5px; min-width: 68px; flex-shrink: 0; }
  .tr-utt-ts { font-size: 11px; color: var(--muted-2); font-variant-numeric: tabular-nums; }
  .tr-speaker {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sc, var(--gold));
    background: color-mix(in srgb, var(--sc, var(--gold)) 14%, transparent);
    border-radius: 4px; padding: 2px 7px; display: inline-block;
  }
  .tr-utt-text { font-size: 15px; line-height: 1.6; color: var(--text); flex: 1; }
  .tr-plain { font-size: 14px; line-height: 1.8; color: var(--muted); padding: 20px; white-space: pre-wrap; margin: 0; }

  /* ---------- TRANSCRIPT STATUS BADGE ---------- */
  .ts-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; border-radius: 999px;
    padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
  }
  .ts-badge-done {
    background: color-mix(in srgb, #3dd68c 14%, transparent);
    color: #3dd68c; border: 1px solid color-mix(in srgb, #3dd68c 35%, transparent);
  }
  .ts-badge-spin {
    background: color-mix(in srgb, var(--gold) 10%, transparent);
    color: var(--gold); border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent);
    animation: ts-fade 1.4s ease-in-out infinite;
  }
  @keyframes ts-fade { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

  /* ---------- TRANSCRIBER RECORDING CARDS ---------- */
  .tr-rec-row {
    display: flex; align-items: center; gap: 14px; text-align: left; width: 100%;
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 18px; color: var(--text);
    transition: border-color .16s, background .16s;
    cursor: pointer;
  }
  .tr-rec-row:hover { border-color: rgba(255,255,255,0.18); background: var(--surface-2); }
  .tr-rec-row-open { border-color: var(--gold); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .tr-rec-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .tr-rec-title { font-size: 15px; font-weight: 600; line-height: 1.25; }
  .tr-rec-by { font-size: 12px; color: var(--muted-2); }
  .tr-rec-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .tr-rec-card { margin-bottom: 10px; }
  .tr-rec-card-open .tr-rec-row { border-color: var(--gold); }
  .tr-rec-body {
    border: 1px solid var(--gold); border-top: 0;
    border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
    padding: 20px 22px; background: color-mix(in srgb, var(--gold) 4%, var(--surface));
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 760px) {
    .nav-inner { padding: 0 16px; height: 62px; gap: 12px; }
    .logo { height: 28px; }
    .internal-label { display: none; }
    .container { padding: 0 16px 56px; }

    .hero { padding: 40px 0 28px; }
    .hero-sub { font-size: 15px; }

    .grid { grid-template-columns: 1fr; }

    .hub { grid-template-columns: 1fr; gap: 14px; }
    .hub-card { min-height: 0; padding: 26px 22px 22px; }
    .hub-label { font-size: 30px; }
    .hub-num { font-size: 38px; }

    .page-head { padding: 38px 0 24px; align-items: stretch; gap: 16px; }
    .page-head .search { width: 100%; }

    .tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { white-space: nowrap; padding: 12px 13px 15px; }

    .presenters { gap: 10px; }
    .presenter { flex: 1 1 calc(50% - 5px); min-width: calc(50% - 5px); padding: 18px 12px 14px; }
    .avatar { width: 48px; height: 48px; font-size: 21px; }

    .rec-card { gap: 13px; padding: 13px 14px; }
    .rec-meta { flex-wrap: wrap; }
    .rec-dur { display: none; }

    .modal { padding: 24px 20px; }
    .modal-title { font-size: 30px; }
    .modal-player { max-height: 92vh; width: 100%; }
    .media-stage { max-height: none; }
    .ts-body { max-height: 200px; }

    .sec-title { font-size: clamp(26px, 8vw, 40px); }
    .gate-card { padding: 36px 26px 28px; }
    .gate-logo { height: 46px; }

    .foot { font-size: 12px; gap: 8px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
